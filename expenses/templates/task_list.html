<h1>Task Manager</h1>

{% for task in tasks %}
    <div>
        <h3>{{ task.title }}</h3>

        <p>Project: {{ task.project }}</p>
        <p>Deadline: {{ task.deadline }}</p>
        <p>Priority: {{ task.priority }}</p>
        <p>Status: {{ task.status }}</p>

        {% if task.deadline < today and task.status != "Done" %}
            <strong style="color:red;">OVERDUE</strong>
        {% endif %}
    </div>

    <hr>

{% endfor %}
